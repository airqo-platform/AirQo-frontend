          echo "url=https://$URL" >> $GITHUB_OUTPUT

  calibrate-pr-comment:
    needs: [check, calibrate_app]
    if: needs.check.outputs.run_calibrate_app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v6
