name: deploy-to-azure-previews-environment

on:
  pull_request:
    branches:
      - staging

env:
  RG: airqo-main-rg
  LOCATION: westeurope
  PR_PREVIEW_ENV: airqo-pr-preview-env
  REGISTRY_URL: airqoacr.azurecr.io
  KEYVAULT: airqo-kv-staging

jobs:

#########################################
# FORMAT BRANCH NAME
#########################################

  branch-name:
    runs-on: ubuntu-latest
    outputs:
      lowercase: ${{ steps.string.outputs.lowercase }}

    steps:
      - id: string
        uses: ASzc/change-string-case-action@v5
        with:
          string: ${{ github.head_ref || github.ref_name }}

#########################################
# DETECT CHANGED SERVICES
#########################################

  check:
    runs-on: ubuntu-latest
    outputs:
      run_calibrate_app: ${{ steps.check_files.outputs.run_calibrate_app }}
      run_analytics_platform: ${{ steps.check_files.outputs.run_analytics_platform }}
      run_website: ${{ steps.check_files.outputs.run_website }}
      run_vertex: ${{ steps.check_files.outputs.run_vertex }}
      run_beacon: ${{ steps.check_files.outputs.run_beacon }}
      run_docs: ${{ steps.check_files.outputs.run_docs }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: check modified frontends
        id: check_files
        run: |
          echo "=============== list modified files ==============="
          git diff --name-only HEAD^ HEAD

          echo "========== check paths of modified files =========="
          git diff --name-only HEAD^ HEAD > files.txt

          echo "run_calibrate_app=false" >>$GITHUB_OUTPUT
          echo "run_analytics_platform=false" >>$GITHUB_OUTPUT   
          echo "run_website2=false" >>$GITHUB_OUTPUT
          echo "run_vertex=false" >>$GITHUB_OUTPUT    
          echo "run_beacon=false" >>$GITHUB_OUTPUT
          echo "run_docs=false" >>$GITHUB_OUTPUT

          while IFS= read -r file
          do
            echo $file
            if [[ $file == src/calibrate/* ]]; then
              echo "run_calibrate_app=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/platform/* ]]; then
              echo "run_analytics_platform=true" >>$GITHUB_OUTPUT
            fi

            if [[ $file == src/website/* ]]; then
              echo "run_website2=true" >>$GITHUB_OUTPUT
            fi            

            if [[ $file == src/vertex/* ]]; then
              echo "run_vertex=true" >>$GITHUB_OUTPUT
            fi 

            if [[ $file == src/beacon/* ]]; then
              echo "run_beacon=true" >>$GITHUB_OUTPUT
            fi 

            if [[ $file == src/docs-website/* ]]; then
              echo "run_docs=true" >>$GITHUB_OUTPUT
            fi

          done < files.txt

#########################################
# WEBSITE PREVIEW
#########################################

  website:
    needs: [check, branch-name]
    if: needs.check.outputs.run_website == 'true'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.preview.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name airqoacr

      - name: Build website image
        run: |
          cd src/website/

          docker build . \
          --build-arg API_URL=${{ secrets.WEBSITE_STAGE_API_URL }} \
          --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.WEBSITE_STAGE_NEXT_PUBLIC_GA_MEASUREMENT_ID }} \
          --build-arg NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.WEBSITE_STAGE_NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }} \
          --tag ${{ env.REGISTRY_URL }}/website-pr-preview:${{ github.sha }}

          docker push ${{ env.REGISTRY_URL }}/website-pr-preview:${{ github.sha }}

      - name: Create env file
        run: |
          echo "API_URL=${{ secrets.WEBSITE_STAGE_API_URL }}" >> .env
          echo "OPENCAGE_API_KEY=${{ secrets.WEBSITE_STAGE_OPENCAGE_API_KEY }}" >> .env
          echo "API_TOKEN=${{ secrets.WEBSITE_STAGE_API_TOKEN }}" >> .env
          echo "SLACK_WEBHOOK_URL=${{ secrets.WEBSITE_STAGE_SLACK_WEBHOOK_URL }}" >> .env
          echo "SLACK_CHANNEL=${{ secrets.WEBSITE_STAGE_SLACK_CHANNEL }}" >> .env
          echo "NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN=${{ secrets.WEBSITE_STAGE_NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN }}" >> .env
          echo "NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.WEBSITE_STAGE_NEXT_PUBLIC_GA_MEASUREMENT_ID }}" >> .env

          
      - name: Deploy Container App
        run: |
          APP=${{ needs.branch-name.outputs.lowercase }}-website-preview

          az containerapp up \
            --name $APP \
            --resource-group ${{ env.RG}} \
            --environment ${{ env.PR_PREVIEW_ENV}} \
            --image ${{ env.REGISTRY_URL }}/website-pr-preview:${{ github.sha }} \
            --target-port 3000 \
            --ingress external

          az containerapp update \
            --name $APP \
            --resource-group ${{ env.RG }} \
            --env-vars $(cat .env | tr '\n' ' ')            

      - id: preview
        run: |
          URL=$(az containerapp show \
          --name ${{ needs.branch-name.outputs.lowercase }}-website-preview \
          --resource-group ${{ env.RG}} \
          --query properties.configuration.ingress.fqdn -o tsv)

          echo "url=https://$URL" >> $GITHUB_OUTPUT

############################################################
# PR COMMENTS
############################################################

  website-pr-comment:
    needs: [check, website]
    if: needs.check.outputs.run_website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'New website changes available for preview [here](${{ needs.website.outputs.url }})'
            })


#########################################
# BEACON PREVIEW (KEY VAULT VERSION)
#########################################

  beacon:
    name: build-push-deploy-beacon-preview
    needs: [check, branch-name]
    if: needs.check.outputs.run_beacon == 'true'
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.preview.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - run: az acr login --name airqoacr

      - name: Pull secrets from Key Vault
        run: |
          az keyvault secret show \
          --vault-name ${{ env.KEYVAULT}} \
          --name sta-env-beacon \
          --query value -o tsv > secrets.json

          jq -r 'to_entries|map("\(.key)=\(.value|tostring)")|.[]' secrets.json > .env

      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY_URL }}/beacon-pr-preview:${{ github.sha }} src/beacon
          docker push ${{ env.REGISTRY_URL }}/beacon-pr-preview:${{ github.sha }}

      - name: Deploy
        run: |
          APP=${{ needs.branch-name.outputs.lowercase }}-beacon-preview

          az containerapp up \
            --name $APP \
            --resource-group ${{ env.RG}} \
            --environment ${{ env.PR_PREVIEW_ENV}} \
            --image ${{ env.REGISTRY_URL }}/beacon-pr-preview:${{ github.sha }} \
            --target-port 3000 \
            --ingress external

          az containerapp update \
            --name $APP \
            --resource-group ${{ env.RG }} \
            --env-vars $(cat .env | tr '\n' ' ')        

      - id: preview
        run: |
          URL=$(az containerapp show \
          --name ${{ needs.branch-name.outputs.lowercase }}-beacon-preview \
          --resource-group ${{ env.RG}} \
          --query properties.configuration.ingress.fqdn -o tsv)

          echo "url=https://$URL" >> $GITHUB_OUTPUT

#########################################
# PR COMMENTS
#########################################

