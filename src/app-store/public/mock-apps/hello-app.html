<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AirQo Partner App</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .wrap {
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
      }
      button {
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 999px;
        border: none;
        background: #145fff;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      pre {
        background: #f1f5f9;
        padding: 12px;
        border-radius: 10px;
        margin-top: 12px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2>Partner Insight Widget</h2>
        <p>This is a sandboxed partner app running inside an iframe.</p>
        <button id="load">Request sample data</button>
        <pre id="output">No data yet.</pre>
      </div>
    </div>
    <script>
      const output = document.getElementById('output');
      document.getElementById('load').addEventListener('click', () => {
        window.parent.postMessage(
          { type: 'AIRQO_APP_REQUEST', payload: { path: '/mock/data' } },
          '*'
        );
      });

      window.addEventListener('message', event => {
        if (event.data?.type === 'AIRQO_APP_RESPONSE') {
          output.textContent = JSON.stringify(event.data.payload, null, 2);
        }
      });
    </script>
  </body>
</html>
