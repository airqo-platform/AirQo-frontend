apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.configmap }}-secret
  namespace: {{ .Values.app.namespace }}
  labels:
    {{- include "internal-docs.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ required "env.APP_KEY must be set (inject via CI/CD/Secrets)" .Values.env.APP_KEY | quote }}
  DB_PASS: {{ required "env.DB_PASSWORD must be set" .Values.env.DB_PASSWORD | quote }}
  DB_PASSWORD: {{ .Values.env.DB_PASSWORD | quote }}
  MYSQL_PASSWORD: {{ .Values.env.DB_PASSWORD | quote }}
  MYSQL_ROOT_PASSWORD: {{ required "env.MYSQL_ROOT_PASSWORD must be set" .Values.env.MYSQL_ROOT_PASSWORD | quote }}
